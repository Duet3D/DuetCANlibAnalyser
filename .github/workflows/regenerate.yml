name: Regenerate decode spec

# Keeps duet_can_spec.json in sync with CANlib automatically. Runs weekly and on
# demand. If the regenerated spec differs (i.e. CANlib added/changed a message),
# it opens a pull request with the update.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update CANlib to latest on its tracked branch
        run: git submodule update --remote --recursive

      - name: Regenerate spec and run tests
        run: python regenerate.py

      - name: Open PR if the spec changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: regenerate Duet CAN spec from CANlib"
          title: "Update Duet CAN decode spec from CANlib"
          body: |
            Automated regeneration of `duet_can_spec.json` from the latest CANlib.
            The decoder unit tests passed. Review the diff for new/changed messages.
          branch: auto/regenerate-spec
          add-paths: |
            duet_can_spec.json
            CANlib
